    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

        {
          "@type": "Question",
          "name": "Wie berechne ich meinen Stundenlohn?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Verwende die 13-Wochen-Formel: Stundenlohn = 3 × Monatslohn ÷ 13 ÷ Wochenstunden. Bei einer 40-Stunden-Woche und 3.000 € Monatslohn ergibt das 17,31 € pro Stunde."
          }
        },
        {
          "@type": "Question",
          "name": "Wie viele Arbeitsstunden hat ein Monat?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Bei einer 40-Stunden-Woche hat ein Monat durchschnittlich 173,33 Arbeitsstunden (40 Stunden × 13 Wochen ÷ 3 Monate). Diese Zahl basiert auf der offiziellen 13-Wochen-Formel."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist der Mindestlohn in Deutschland 2026?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Der gesetzliche Mindestlohn in Deutschland beträgt seit dem 1. Januar 2026 13,90 Euro brutto pro Stunde. Im Jahr 2027 steigt er auf 14,60 Euro."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist die 13-Wochen-Formel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Die 13-Wochen-Formel ist die offizielle Methode zur Berechnung des Stundenlohns: Stundenlohn = (3 × Monatslohn) ÷ 13 ÷ Wochenstunden. Sie basiert darauf, dass ein Quartal durchschnittlich 13 Wochen hat (52 Wochen ÷ 4)."
          }
        },
        {
          "@type": "Question",
          "name": "Zählen Pausen zum Stundenlohn?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nein, gesetzliche Ruhepausen sind in der Regel unbezahlt. Mindestens 30 Minuten bei 6-9 Stunden Arbeitszeit und mindestens 45 Minuten bei mehr als 9 Stunden."
          }
        },
        {
          "@type": "Question",
          "name": "Sind Überstundenzuschläge im Stundenlohn enthalten?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nein, der Stundenlohn ist der reguläre Verdienst. Überstundenzuschläge (meist 25%, 50% oder 100%) kommen zusätzlich hinzu und werden auf Basis des regulären Stundenlohns berechnet."
          }
        },
        {
          "@type": "Question",
          "name": "Wie rechnet man den Jahreslohn in Stundenlohn um?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mit der 13-Wochen-Formel: Stundenlohn = (Jahresgehalt ÷ 12 ÷ 13) ÷ Wochenstunden. Beispiel: 50.000 € Jahresgehalt bei 40h/Woche = ca. 24,04 € pro Stunde."
          }
        }
      ]
    }
